name: Build and Push Docker Images

on:
  push:
    branches: [ main ]

env:
  DOCKER_USERNAME: yash1508
  DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ env.DOCKER_USERNAME }}" --password-stdin
      - name: Build and push backend
        run: |
          docker build -t ${{ env.DOCKER_USERNAME }}/grc-backend:latest .
          docker push ${{ env.DOCKER_USERNAME }}/grc-backend:latest

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ env.DOCKER_USERNAME }}" --password-stdin
      - name: Build and push frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=/api \
            -t ${{ env.DOCKER_USERNAME }}/grc-frontend:latest \
            -f frontend/Dockerfile \
            frontend/
          docker push ${{ env.DOCKER_USERNAME }}/grc-frontend:latest