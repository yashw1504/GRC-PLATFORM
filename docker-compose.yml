version: "3.9"

services:

  backend:

    build:
      context: .

    container_name: grc-backend

    ports:
      - "8000:8000"

    env_file:
      - .env

  frontend:

    build:
      context: ./frontend

    container_name: grc-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend