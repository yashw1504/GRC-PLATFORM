services:
  db:
    image: postgres:15-alpine
    container_name: grc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: grc_platform
      POSTGRES_USER: grc_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-grc_secure_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    # Do not expose Postgres publicly on EC2 — backend connects via Docker network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grc_user -d grc_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grc-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=grc_platform
      - DB_USER=grc_user
      - DB_PASSWORD=${DB_PASSWORD:-grc_secure_password}
      - EC2_PUBLIC_IP=13.203.104.20
      - FRONTEND_URL=http://13.203.104.20
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
      - ./extracted:/app/extracted
      - ./output:/app/output

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Browser calls /api on the same host; nginx proxies to backend
        VITE_API_URL: /api
    container_name: grc-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
