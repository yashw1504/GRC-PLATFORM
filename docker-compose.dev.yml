# Local development override. The default docker-compose.yml is deployable on
# EC2 by itself and pulls published images; include this file to build source.
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    pull_policy: build
